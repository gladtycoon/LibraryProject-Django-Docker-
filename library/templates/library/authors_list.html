{% extends 'library/base.html' %}

{% block title %}Список авторов{% endblock %}

{% block content %}
{% include 'library/header.html' %}
<h2>Список авторов</h2>
<ul class="list_group">
    {% for author in authors %}
        <li class="list_group_item">
            {{ author.first_name }} {{ author.last_name }}
        </li>
    {% endfor %}
</ul>
{% endblock %}
